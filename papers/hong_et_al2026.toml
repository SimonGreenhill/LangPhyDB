title = "The evolutionary dynamics of ergative alignment of case marking"

doi = "10.1093/jole/lzag004"

abstract = """
Languages have been claimed to globally disfavor ergatively-aligned case marking, possibly reflecting processing preferences.
Phylogenetic research on Pama-Nyungan has cast doubt on this, showing a preference for retaining ergativity in the family. In
this study, we re-examine the evolution of ergative alignment of case marking in a sample of over 200 languages from eleven
language families (Pama-Nyungan among them) in a continuous-time Markov Chain model. Since one language can adopt multiple
alignment patterns of case marking in its grammar ('split' alignment), we incorporate a third, split state into the models. In
addition, we compare the goodness of fit across various models where clades can show different rates of change, defining
evolutionary regimes that can cut across families. The results show that, across all families, the best-fitting model requires
two connected regimes: one favoring non-ergative (S=A) and the other favoring split-ergative alignment (S=A and S≠A). These
differences notwithstanding, the stationary probabilities of the model suggest that in the long run, non-ergative alignments
are expected to be much more frequent than ergative alignment in case marking.
"""

# authors in "Firstname Initial. Lastname" e.g. Simon J. Greenhill
authors = ["Tai Hong", "Alena Witzlack-Makarevich", "Balthasar Bickel"]

# parts of the world
groups = ['Austronesian', 'Bantu', 'Dravidian', 'Indo-European', 'Pama-Nyungan', 'Semitic', 'Sino-Tibetan', 'Tupian', 'Turkic', 'Uralic', 'Uto-Aztecan']

# bibkey citation in sources.bib
bibkey = "@Hong_2026"

# type of study
type = ['trait', 'macroevolutionary']
framework = ['bayesian', 'statistical']

# short description of the study, one line.
description = "Continuous-time Markov Chain analysis of ergative case-marking evolution across 11 language families using published phylogenies and AUTOTYP data"

# data
[data]

    notes = "Case alignment data from AUTOTYP database v1.1.1 (Bickel et al. 2023, doi:10.5281/zenodo.7976754), supplemented by ATLAs database following identical coding principles."

    [data.alignment]
    ntaxa = 296
    nchars = 1
    nsites = "?"
    datatype = 'structural features'
    source = '@Autotyp2023'
    items = ''
    comment = 'Ergative alignment coded as 3 states: non-ergative (S=A), ergative (S≠A), split (both). Covers 11 language families.'

# published phylogenies
[phylogenies]
    notes = "Published time-calibrated posterior tree distributions used as input; one per family."

    [phylogenies.austronesian]
    source = '@Gray2009'
    comment = 'Austronesian'

    [phylogenies.bantu]
    source = '@Grollemund2015'
    comment = 'Bantu'

    [phylogenies.dravidian]
    source = '@Kolipakam2018'
    comment = 'Dravidian'

    [phylogenies.indoeuropean]
    source = '@Bouckaert2012'
    comment = 'Indo-European'

    [phylogenies.pamanyungan]
    source = '@Bouckaert2018'
    comment = 'Pama-Nyungan'

    [phylogenies.semitic]
    source = '@Kitchen2009'
    comment = 'Semitic'

    [phylogenies.sinotibetan]
    source = '@Sagart2019'
    comment = 'Sino-Tibetan'

    [phylogenies.tupiguarani]
    source = '@Michael2015'
    comment = 'Tupi-Guarani'

    [phylogenies.turkic]
    source = '@Savelyev_2020'
    comment = 'Turkic'

    [phylogenies.uralic]
    source = '@Syrjanen2013'
    comment = 'Uralic'

    [phylogenies.utoaztecan]
    source = '@GreenhillHaynie_et_al2023'
    comment = 'Uto-Aztecan'


# date calibrations
[calibrations]
    notes = "No divergence time estimation; published dated trees used as input only."


# analysis information
[analysis]

    notes = "Continuous-time Markov Chain (CTMC) with 3 states (non-ergative, ergative, split) fit to posterior tree distributions using Felsenstein's pruning algorithm. Multi-regime models (different rates in different clades) compared via Bayes factors. Implemented in Stan."

    [analysis.ctmc]
    tool = 'r'
    model = 'CTMC (3-state)'
    details = "Bayesian MCMC via Stan; multi-regime models allowing different rates across clades; model comparison via Bayes factors; Felsenstein pruning algorithm for likelihood"
    data = "@Autotyp2023"

    [analysis.scm]
    tool = 'r'
    model = ''
    details = "Stochastic character mapping via phytools for ancestral state reconstruction"
    data = "@Autotyp2023"


[inferredages]
    notes = "No divergence time estimates produced. Study models trait evolution rates, not node ages."


