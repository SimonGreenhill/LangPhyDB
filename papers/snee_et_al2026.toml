# type of study
type = ['methodological', 'phylogenetic']
framework = ['bayesian', 'distance', 'statistical']

# short description of the study, one line.
description = "Effect of concept translation variation on Bayesian phylogenetic reconstruction across 7 paired wordlists from 5 language families"

