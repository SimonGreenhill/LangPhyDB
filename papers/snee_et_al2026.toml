# analysis information
[analysis]

    notes = "For all 14 datasets: (1) SCA cognate detection via LingPy (threshold=0.5); (2) MrBayes Bayesian inference (4 chains, 2 independent runs, 20M generations, sample every 10,000, 25% burnin, substitution model with gamma rate variation, fossilised birth-death clock, exponential prior on clock rate mean=300,000, uniform MRCA age prior 1,000-10,000 BP). Per-pair comparisons: (3) Mantel test on pairwise lexical distance matrices (999 permutations, Pearson r); (4) normalized quartet distance on posterior tree samples (100 draws of 1,000 tree pairs from last 1,500 sampled trees per run); (5) B-Cubed F-Score comparison of UPGMA partitions."

