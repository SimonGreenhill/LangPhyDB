title = "Impact of ecology, subsistence, and climate on language spread rates"

doi = "10.1016/j.qeh.2026.100107"

abstract = """
Different languages occupy every region of the globe. How fast have languages spread and what are the factors systematically impacting these rates? Based on state-of-the-art methods and data from more than 5500 languages this paper reconstructs the movements of prehistorical languages, analyzing more than 2500 language diffusion events. Up until 2000 BP diffusion rates are typically low (0.1–0.3 km/yr). Subsequently all world areas except North America, Australia, and Papua New Guinea exhibit increases in rates, with Eurasian languages, in particular, undergoing an explosive spread. Higher diffusion rates for the languages of farmers than for those of hunter-gatherers contribute to explaining these areal differences. Intriguingly, major fluctuations in diffusion rates not conforming to general patterns are aligned with two of the most dramatic climate change events of the Holocene, namely the 5.5 ka BP end of the African Humid Period and the cooling and drying event of 4.2 ka BP affecting Eurasia.
"""

# authors in "Firstname Initial. Lastname" e.g. Simon J. Greenhill
authors = ['Søren Wichmann']

# parts of the world
groups = ['Global']

# bibkey citation in sources.bib
bibkey = "@Wichmann_2026"

# type of study
type = ['phylogeography', 'dating']
framework = ['bayesian', 'distance', 'statistical']

# short description of the study, one line.
description = "Global study of language diffusion rates across 5500+ languages, finding that farming, ecology, and Holocene climate events systematically explain variation in how fast language families spread."

# data
[data]

    notes = ""

    [data.asjp]
    ntaxa = 5500
    nchars = 40
    nsites = "?"
    datatype = 'lexical distance'
    source = '@ASJP21'
    items = ''
    comment = 'ASJP v21 covering 82% of world languages (6135 total); >5500 used after filtering ancient languages and families with <4 taxa or star-shaped topology. LDND distances computed for dating and homeland inference.'

# published phylogenies
[phylogenies]
    notes = ""

    [phylogenies.glottolog]
    source = '@Glottolog52'
    comment = 'Family-level tree topologies from Glottolog 5.2; branch lengths fitted using ASJP LDN distances by least-squares estimation'


# date calibrations
[calibrations]

    notes = "Dating uses the LDND method (Holman et al. 2011) with 52 archaeological/historical calibration points; mean fit error 29%. Calibrations are internal to the LDND method, not explicit per-clade priors."


# analysis information
[analysis]

    notes = "Full replication pipeline at https://osf.io/5pwju/"

    [analysis.dating]
    tool = 'custom'
    model = 'LDND'
    details = "Twice-normalized lexical-phonological Levenshtein distances (LDND) from ASJP wordlists transformed to years of separation using Holman et al. 2011 calibration (52 calibration points, 29% mean error)."
    data = "@ASJP21"

    [analysis.homeland_bt]
    tool = 'bayestraits'
    model = 'BayesTraits Geo'
    details = "Brownian motion model mapping nodes to 3D Cartesian coordinates; used for 2191 of 3417 homelands (64%). Requires >=4 taxa and non-star-shaped topology."
    data = "@ASJP21"

    [analysis.homeland_md]
    tool = 'r'
    model = 'Minimum Distance'
    details = "Non-tree-based Minimum Distance method (Wichmann & Rama 2021) for remaining 36% of homelands; applied to star-shaped phylogenies and families with <4 taxa."
    data = "@ASJP21"

    [analysis.statistics]
    tool = 'r'
    model = ''
    details = "t-tests, chi-squared tests, and linear regression for effects of ecology (biomes, elevation, rugosity), subsistence (AGR vs HG), and Holocene climate events on diffusion rates."
    data = "@ASJP21"

[inferredages]

    notes = "Ages inferred for proto-language homelands across all major world families; >2500 diffusion events analyzed. Table 1 lists notable events tied to Holocene climate peaks. Point estimates with ~29% uncertainty."

    [inferredage.classical_indo_european]
    taxa = ['Classical Indo-European']
    age = "4205"
    units = "bp"
    details =  "Homeland at 45.89N, 29.65E; BayesTraits Geo"

